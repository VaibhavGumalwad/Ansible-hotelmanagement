# Database configuration - values injected at runtime via environment variables
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hotel_booking_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT configuration - secret injected at runtime via environment variables
jwt.secret=${JWT_SECRET:default_secret_key_must_be_at_least_256_bits_long_for_hs256}
jwt.expiration=86400000

server.port=8080
