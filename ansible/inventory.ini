# This file is overwritten dynamically by Jenkins during the 'Deploy with Ansible' stage.
# The APP_SERVER_IP is captured from 'terraform output -raw app_server_public_ip'
# The SSH key is retrieved dynamically from AWS Parameter Store
# Do not manually set IPs here — they will be replaced on every pipeline run.

[app_servers]
app_server ansible_host=PLACEHOLDER ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/hotel-booking-key.pem

[jenkins]
jenkins_server ansible_host=PLACEHOLDER ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/hotel-booking-key.pem
